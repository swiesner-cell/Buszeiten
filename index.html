<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Buszeiten Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 15px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #0f172a;
      padding: 15px;
      border-radius: 16px;
      margin-bottom: 15px;
    }

    .departure {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
    }

    .soon {
      color: #22c55e;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #38bdf8;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>🚌 Buszeiten</h1>

<div class="card">
  <b>Linie 67 – An der Kirche (Dölzig)</b>
  <div id="stop1">Lade...</div>
</div>

<div class="card">
  <b>Linie 131 – Holländische Mühle</b>
  <div id="stop2">Lade...</div>
</div>

<button onclick="loadAll()">🔄 Aktualisieren</button>

<script>
const proxy = "https://api.allorigins.win/raw?url=";

function getMinutes(time) {
  return Math.round((new Date(time) - new Date()) / 60000);
}

async function fetchJSON(url) {
  const res = await fetch(proxy + encodeURIComponent(url));
  return await res.json();
}

async function getDepartures(stopName, line, containerId) {
  try {
    const locData = await fetchJSON(
      `https://transport.rest/locations?query=${stopName}&results=1`
    );

    if (!locData.length) return;

    const id = locData[0].id;

    const deps = await fetchJSON(
      `https://transport.rest/stops/${id}/departures?duration=120`
    );

    const filtered = deps.filter(d =>
      d.line.name == line &&
      d.direction.toLowerCase().includes("leipzig")
    );

    let html = "";

    filtered.slice(0,5).forEach(dep => {
      const time = new Date(dep.when);
      const min = getMinutes(dep.when);

      html += `
        <div class="departure ${min <= 3 ? "soon" : ""}">
          <div>${time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
          <div>${min <= 0 ? "jetzt" : "in " + min + " min"}</div>
        </div>
      `;
    });

    document.getElementById(containerId).innerHTML = html || "Keine Daten";

  } catch (e) {
    document.getElementById(containerId).innerText = "Fehler";
  }
}

function loadAll() {
  getDepartures("Dölzig An der Kirche", "67", "stop1");
  getDepartures("Holländische Mühle", "131", "stop2");
}

loadAll();
setInterval(loadAll, 30000);
</script>

</body>
</html>
